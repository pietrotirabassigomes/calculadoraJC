<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Juros</title>
    <script src="calcJC.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="container">
        <h2>Calculadora de Juros</h2>
        <p class="subtitulo">Simples e Compostos</p>

        <div id="formulario">
            <form action="">
                <div class="borda">
                    <label for="capital">Capital</label>
                    <input type="number" id="capital" placeholder="R$ 0,00"><br>
                </div>
                <div class="borda">
                    <label for="taxa">Taxa</label>
                    <input type="number" id="taxa" placeholder="Em % ao mês"><br>
                </div>
                <div class="borda">
                    <label for="tempo">Tempo</label>
                    <input type="number" id="tempo" placeholder="Em meses"><br>
                </div>

                <select name="juros" id="juros">
                    <option value="composto">Juros Compostos</option>
                    <option value="simples">Juros Simples</option>
                </select>

                <p id="resultado"></p>

                <button type="button" onclick="calcular()">Calcular</button>
                <button id="botaored" type="button" onclick="limparCalculo()">Novo cálculo</button>
            </form>
        </div>
    </div>
</body>

</html>
